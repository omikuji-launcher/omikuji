app-id: io.github.reakjra.omikuji
sdk: org.kde.Sdk
runtime: org.kde.Platform
runtime-version: "6.10"
command: omikuji
separate-locales: false # translations
base: org.winehq.Wine
base-version: stable-25.08
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio # notification sound
  - --allow=devel # ubisoft connect and other launchers
  - --allow=multiarch
  - --allow=per-app-dev-shm # pressure-vessel
  - --device=all
  - --system-talk-name=org.freedesktop.UDisks2
  - --env=GST_PLUGIN_SYSTEM_PATH=/app/lib/gstreamer-1.0:/app/lib32/gstreamer-1.0:/usr/lib/extensions/gstreamer-1.0:/usr/lib/x86_64-linux-gnu/codecs-extra/lib/gstreamer-1.0:/usr/lib/i386-linux-gnu/codecs-extra/lib/gstreamer-1.0:/usr/lib/x86_64-linux-gnu/gstreamer-1.0:/usr/lib/i386-linux-gnu/gstreamer-1.0
  - --filesystem=home
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=/run/media
  - --filesystem=~/.var/app/com.valvesoftware.Steam

inherit-extensions:
  - org.winehq.Wine.gecko
  - org.winehq.Wine.mono
  - org.freedesktop.Platform.GL32
  - org.freedesktop.Platform.Compat.i386
  - org.freedesktop.Platform.codecs_extra.i386
  - org.freedesktop.Platform.VAAPI.Intel.i386
  - org.freedesktop.Platform.VAAPI.nvidia.i386

add-extensions:
  org.freedesktop.Platform.VulkanLayer.MangoHud:
    directory: lib/extensions/vulkan/MangoHud
    version: "25.08"
    autodownload: true
    autodelete: false

  org.freedesktop.Platform.VulkanLayer.gamescope:
    directory: lib/extensions/vulkan/gamescope
    version: "25.08"
    autodownload: true
    autodelete: false

modules:
  - name: omikuji
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/omikuji/cargo
        CARGO_NET_OFFLINE: "true"
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo build --offline --release --all-features
      - install -Dm0755 target/release/omikuji ${FLATPAK_DEST}/bin/omikuji
      - install -Dm0644 crates/omikuji/qml/icons/app.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/io.github.reakjra.omikuji.png
      - install -Dm0644 packaging/io.github.reakjra.omikuji.desktop.in ${FLATPAK_DEST}/share/applications/io.github.reakjra.omikuji.desktop
      - install -Dm0644 packaging/io.github.reakjra.omikuji.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.reakjra.omikuji.metainfo.xml
    sources:
      - cargo-sources.json
      - type: git
        url: https://github.com/reakjra/omikuji.git
        tag: "v0.2.2"

  - name: bundle-setup
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/i386-linux-gnu
      - mkdir -p /app/lib/debug/lib/i386-linux-gnu
      - mkdir -p /app/lib/i386-linux-gnu/GL
      - mkdir -p /app/lib/i386-linux-gnu/dri/intel-vaapi-driver
      - mkdir -p /app/i386/nvidia-vaapi-driver
      - install -Dm644 ld.so.conf /app/etc/ld.so.conf
      - mkdir -p /app/lib/extensions/vulkan/MangoHud
      - mkdir -p /app/lib/extensions/vulkan/gamescope
      - ln -sf /app/lib/extensions/vulkan/MangoHud/bin/mangohud /app/bin/
      - ln -sf /app/lib/extensions/vulkan/gamescope/bin/gamescope /app/bin/
    sources:
      - type: inline
        dest-filename: ld.so.conf
        contents: |
          /app/lib32
          /app/lib/i386-linux-gnu
          /app/i386
          /usr/lib/x86_64-linux-gnu/dri/intel-vaapi-driver/lib/
