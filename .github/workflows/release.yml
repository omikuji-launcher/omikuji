name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: 1.0.0)"
        required: false
        type: string

      prerelease:
        description: "Mark as prerelease"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  appimage:
    name: Build AppImage
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install system deps + Qt
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            pkg-config \
            protobuf-compiler \
            wget \
            cmake \
            ninja-build \
            file \
            libudev-dev \
            libfuse2 \
            fuse \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor-dev \
            libcups2-dev \
            libglib2.0-0 \
            libglib2.0-dev \
            libproxy1v5 \
            libproxy-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-wayland \
            qt6-wayland-dev \
            libqt6waylandclient6 \
            qml6-module-qtwayland-compositor \
            libqt6core5compat6 \
            libqt6core5compat6-dev \
            qt6-base-private-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Locate qsb
        run: |
          QSB_PATH="$(command -v qsb)"

          if [ -z "$QSB_PATH" ]; then
            echo "qsb not found"
            exit 1
          fi

          echo "QSB_PATH=$QSB_PATH" >> "$GITHUB_ENV"

      - name: Download linuxdeploy + qt plugin
        run: |
          mkdir -p tools

          wget -qO tools/linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage

          wget -qO tools/linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage

          chmod +x tools/linuxdeploy tools/linuxdeploy-plugin-qt

          echo "EXTRA_PLATFORM_PLUGINS=libqwayland-generic.so" >> "$GITHUB_ENV"

          echo "EXTRA_QT_MODULES=svg,imageformats,wayland-decoration-client,wayland-graphics-integration-client,wayland-shell-integration" >> "$GITHUB_ENV"

          echo "$PWD/tools" >> "$GITHUB_PATH"

      - name: Build release binary
        run: cargo build --release -p omikuji

      - name: Set up AppDir
        run: |
          APPDIR="$RUNNER_TEMP/omikuji-appdir"

          echo "APPDIR=$APPDIR" >> "$GITHUB_ENV"

          rm -rf "$APPDIR"

          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/512x512/apps"

          cp target/release/omikuji \
            "$APPDIR/usr/bin/omikuji"

          sed "s|@EXEC_PATH@|omikuji|" \
            packaging/io.github.reakjra.omikuji.desktop.in \
            > "$APPDIR/usr/share/applications/io.github.reakjra.omikuji.desktop"

          cp crates/omikuji/qml/icons/app.png \
            "$APPDIR/usr/share/icons/hicolor/512x512/apps/io.github.reakjra.omikuji.png"

      - name: Build AppImage with custom AppRun
        env:
          NO_STRIP: "1"
          QML_SOURCES_PATHS: ${{ github.workspace }}/crates/omikuji/qml
        run: |
          chmod +x packaging/AppRun

          linuxdeploy \
            --appdir "$APPDIR" \
            --plugin qt \
            --custom-apprun=packaging/AppRun \
            --output appimage

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AppImage
          path: "*.AppImage"
          archive: false

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: "*.AppImage"
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
