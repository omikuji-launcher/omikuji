name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: 1.0.0)"
        required: false
        type: string

      prerelease:
        description: "Mark as prerelease"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm archlinux-keyring
          pacman -Syu --noconfirm pkg-config \
          base-devel \
          sudo \
          cmake \
          systemd-libs \
          fuse2 \
          wget \
          protobuf \
          rust \
          cmake \
          libxkbcommon \
          xcb-util-cursor \
          libcups \
          glib2 \
          libproxy \
          qt6-base \
          qt6-tools \
          qt6-wayland \
          qt6-shadertools \
          qt6-declarative \
          qt6-5compat \
          qt6-svg \
          libfbclient \
          mariadb \
          unixodbc \
          postgresql-libs \
          jxrlib

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fix permissions
        run: chown -R builder:builder .

      - name: Build
        run: |
          sudo -u builder sh <<'EOF'
          set -e
          cargo build --release -p omikuji

          export APPIMAGE_EXTRACT_AND_RUN=1

          chmod +x ./packaging/make-appimage.sh
          ./packaging/make-appimage.sh
          EOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AppImage
          path: "*.AppImage"
          archive: false

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: "*.AppImage"
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
